<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Palestrante</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-container">
        <h2>Login - Palestrante</h2>
    {% if mensagem_erro %}
        <div class="erro">{{ mensagem_erro }}</div>
    {% endif %}
    
    {% if mensagem_sucesso %}
        <div class="sucesso">{{ mensagem_sucesso }}</div>
    {% endif %}

    <form method="POST">
        <label for="email">Email:</label>
        <input type="text" name="email" id="email" required placeholder="Digite seu E-mail">

        <label for="senha">Senha:</label>
        <input type="password" name="senha" id="senha" required placeholder="Digite sua senha">

        <button type="submit">Entrar</button>
    </form>

    <a href="{{ url_for('login_palestrante.esqueci_senha') }}">Esqueceu a senha?</a>
</div>
</body>
</html>
